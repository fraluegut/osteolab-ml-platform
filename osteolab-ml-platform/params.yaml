dataset:
  path: data/raw/bones
  classes:
    - craneo
    - femur
    - humero

training:
  image_size: 32
  test_size: 0.2
  max_images_per_class: 1000
  random_state: 42

model:
  name: logistic_regression
  max_iter: 1000
  solver: lbfgs

inference:
  model_version: baseline_v1

geometric_dataset:
  path: data/processed/bone_geometric_features.csv

geometric_training:
  test_size: 0.2
  random_state: 42

geometric_model:
  name: random_forest
  n_estimators: 300
  max_depth: null