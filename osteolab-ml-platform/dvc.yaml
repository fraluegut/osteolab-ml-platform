stages:
  train_geometric:
    cmd: python -m src.training.train_geometric
    deps:
      - src/training/train_geometric.py
      - src/cv_extractor/extract.py
      - data/processed/bone_geometric_features.csv
    params:
      - geometric_dataset
      - geometric_training
      - geometric_model
    outs:
      - models/geometric_model_bone_group.joblib
      - models/geometric_encoder_bone_group.joblib
      - models/geometric_feature_columns_bone_group.joblib
      - models/geometric_pca_pipeline.joblib
      - data/processed/bone_geometric_pca_reference.csv
